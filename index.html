<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Sant Andreu de la Barca - OSM</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-sidebar: rgba(255, 255, 255, 0.95);
            --accent: #3498db;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        #sidebar {
            position: absolute; top: 20px; left: 20px; width: 310px; z-index: 1000;
            background: var(--bg-sidebar); padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); max-height: 85vh; overflow-y: auto;
        }

        h2 { margin: 0; color: var(--primary-color); font-size: 1.3rem; }
        p.subtitle { margin: 0 0 15px 0; font-size: 0.8rem; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        details {
            margin-bottom: 10px; border-radius: 8px; background: #f1f3f5;
            overflow: hidden; border: 1px solid transparent;
        }

        summary {
            padding: 12px; font-weight: bold; font-size: 0.85rem; color: var(--primary-color);
            cursor: pointer; display: flex; align-items: center;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* Estil per al checkbox de la categoria */
        .category-master-check { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }

        .category-content { padding: 5px 10px 10px 10px; background: #fff; }

        .layer-item {
            display: flex; align-items: center; padding: 8px; margin-bottom: 4px;
            background: #f8f9fa; border-radius: 6px; cursor: pointer;
        }
        .layer-item:hover { background: #e9ecef; }
        .layer-item input { margin-right: 12px; width: 16px; height: 16px; cursor: pointer; }
        .layer-item label { cursor: pointer; flex-grow: 1; font-size: 0.9rem; }

        .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); margin-left: 5px; }

        @media (max-width: 480px) { #sidebar { width: calc(100% - 60px); left: 10px; } }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Sant Andreu de la Barca</h2>
        <p class="subtitle">Elements destacats de la ciutat</p>

        <details open>
            <summary>
                <input type="checkbox" class="category-toggle" title="Selecciona tot el grup">
                Cultura i Història
            </summary>
            <div class="category-content">
                <div class="layer-item">
                    <input type="checkbox" class="layer-toggle" id="patrimoni" data-file="patrimoni.geojson" data-color="#e74c3c">
                    <label for="patrimoni">Patrimoni Històric</label>
                    <div class="dot" style="background: #e74c3c;"></div>
                </div>
                <div class="layer-item">
                    <input type="checkbox" class="layer-toggle" id="monuments" data-file="monuments.geojson" data-color="#9b59b6">
                    <label for="monuments">Monuments</label>
                    <div class="dot" style="background: #9b59b6;"></div>
                </div>
            </div>
        </details>

        <details>
            <summary>
                <input type="checkbox" class="category-toggle" title="Selecciona tot el grup">
                Natura i Espais
            </summary>
            <div class="category-content">
                <div class="layer-item">
                    <input type="checkbox" class="layer-toggle" id="parcs" data-file="parcs.geojson" data-color="#27ae60">
                    <label for="parcs">Parcs i Jardins</label>
                    <div class="dot" style="background: #27ae60;"></div>
                </div>
                <div class="layer-item">
                    <input type="checkbox" class="layer-toggle" id="fonts" data-file="fonts.geojson" data-color="#3498db">
                    <label for="fonts">Fonts Públiques</label>
                    <div class="dot" style="background: #3498db;"></div>
                </div>
            </div>
        </details>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([41.4475, 1.9328], 15);
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const individualLayers = {};

        // Funció per carregar/treure una capa individual
        async function toggleLayer(checkbox) {
            const id = checkbox.id;
            const fileName = checkbox.getAttribute('data-file');
            const color = checkbox.getAttribute('data-color');
            const filePath = `dades/${fileName}`;

            if (checkbox.checked) {
                if (individualLayers[id]) {
                    map.addLayer(individualLayers[id]);
                } else {
                    try {
                        const response = await fetch(filePath);
                        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                        const data = await response.json();

                        const geojsonLayer = L.geoJSON(data, {
                            pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                                radius: 8, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9
                            }),
                            onEachFeature: (feature, layer) => {
                                layer.bindPopup(`<strong>${feature.properties.name || "Sense nom"}</strong>`);
                            }
                        });

                        individualLayers[id] = geojsonLayer;
                        map.addLayer(geojsonLayer);
                    } catch (err) {
                        console.error("Error carregant:", fileName, err);
                    }
                }
            } else {
                if (individualLayers[id]) map.removeLayer(individualLayers[id]);
            }
        }

        // Lògica per als checkboxes individuals
        document.querySelectorAll('.layer-toggle').forEach(input => {
            input.addEventListener('change', (e) => toggleLayer(e.target));
        });

        // Lògica per al checkbox de CATEGORIA (Seleccionar tot)
        document.querySelectorAll('.category-toggle').forEach(masterCheck => {
            masterCheck.addEventListener('change', function(e) {
                // Evitem que el clic al checkbox tanqui/obri el "details"
                e.stopPropagation();

                // Busquem tots els checkboxes dins d'aquesta categoria (details)
                const parentDetails = this.closest('details');
                const childChecks = parentDetails.querySelectorAll('.layer-toggle');

                childChecks.forEach(check => {
                    // Només canviem i disparem l'esdeveniment si el valor és diferent
                    if (check.checked !== this.checked) {
                        check.checked = this.checked;
                        // Disparem l'esdeveniment 'change' manualment per carregar la capa
                        toggleLayer(check);
                    }
                });
            });

            // Evitem que en fer clic al checkbox es col·lapsi el menú
            masterCheck.addEventListener('click', (e) => e.stopPropagation());
        });
    </script>
</body>
</html>
