<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Sant Andreu de la Barca - OSM</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-sidebar: rgba(255, 255, 255, 0.95);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        #sidebar {
            position: absolute; top: 20px; left: 20px; width: 300px; z-index: 1000;
            background: var(--bg-sidebar); padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); max-height: 85vh; overflow-y: auto;
        }

        h2 { margin: 0; color: var(--primary-color); font-size: 1.4rem; }
        p.subtitle { margin: 0 0 15px 0; font-size: 0.85rem; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .category-title { font-weight: bold; margin: 15px 0 8px 0; display: block; color: #555; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }

        .layer-item {
            display: flex; align-items: center; padding: 10px; margin-bottom: 6px;
            background: #f8f9fa; border-radius: 6px; cursor: pointer;
        }
        .layer-item input { margin-right: 12px; width: 18px; height: 18px; cursor: pointer; }
        .layer-item label { cursor: pointer; flex-grow: 1; font-size: 0.95rem; }

        /* Mini llegenda dins del menú */
        .color-preview { display: flex; gap: 3px; margin-left: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Sant Andreu de la Barca</h2>
        <p class="subtitle">Visor d'elements destacats</p>

        <span class="category-title">Capes Personalitzades</span>

        <div class="layer-item">
            <input type="checkbox" class="layer-toggle" id="aparcament" 
                   data-files="aparcament-lliure.geojson, aparcament-blava.geojson" 
                   data-colors="#09C86C, #272EF5"> <label for="aparcament">Aparcament</label>
            <div class="color-preview">
                <div class="dot" style="background: #09C86C;"></div>
                <div class="dot" style="background: #272EF5;"></div>
            </div>
        </div>

        
        <div class="layer-item">
            <input type="checkbox" class="layer-toggle" id="cat-cultura" 
                   data-files="patrimoni.geojson, monuments.geojson" 
                   data-colors="#e74c3c, #9b59b6"> <label for="cat-cultura">Cultura i Història</label>
            <div class="color-preview">
                <div class="dot" style="background: #e74c3c;"></div>
                <div class="dot" style="background: #9b59b6;"></div>
            </div>
        </div>

        <div class="layer-item">
            <input type="checkbox" class="layer-toggle" id="cat-natura" 
                   data-files="parcs.geojson, fonts.geojson" 
                   data-colors="#27ae60, #3498db"> <label for="cat-natura">Natura i Aigua</label>
            <div class="color-preview">
                <div class="dot" style="background: #27ae60;"></div>
                <div class="dot" style="background: #3498db;"></div>
            </div>
        </div>

    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const map = L.map('map', { zoomControl: false }).setView([41.4500, 1.9714], 16);
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const loadedGroups = {};

        async function toggleLayerGroup(checkbox) {
            const id = checkbox.id;
            const fileList = checkbox.getAttribute('data-files').split(',');
            const colorList = checkbox.getAttribute('data-colors').split(',');

            if (checkbox.checked) {
                if (loadedGroups[id]) {
                    map.addLayer(loadedGroups[id]);
                } else {
                    const newGroup = L.layerGroup();
                    
                    // Mapegem cada fitxer amb el seu color corresponent per índex
                    const loadPromises = fileList.map(async (fileName, index) => {
                        try {
                            const response = await fetch(`dades/${fileName.trim()}`);
                            const data = await response.json();
                            
                            // Assignem el color segons la posició a la llista (o gris si no n'hi ha prou)
                            const specificColor = (colorList[index] || "#95a5a6").trim();
                            const layerName = fileName.trim().replace('.geojson', '');

                            const geoLayer = L.geoJSON(data, {
                                pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                                    radius: 8,
                                    fillColor: specificColor,
                                    color: "#fff",
                                    weight: 2,
                                    fillOpacity: 0.9
                                }),
                                onEachFeature: (feature, layer) => {
                                    layer.bindPopup(`
                                        <div style="text-align:center">
                                            <strong style="color:${specificColor}">${feature.properties.name || "Sense nom"}</strong><br>
                                            <small>Capa: ${layerName}</small>
                                        </div>
                                    `);
                                }
                            });
                            newGroup.addLayer(geoLayer);
                        } catch (err) {
                            console.error("Error:", err);
                        }
                    });

                    await Promise.all(loadPromises);
                    loadedGroups[id] = newGroup;
                    map.addLayer(newGroup);
                }
            } else {
                if (loadedGroups[id]) map.removeLayer(loadedGroups[id]);
            }
        }

        document.querySelectorAll('.layer-toggle').forEach(input => {
            input.addEventListener('change', (e) => toggleLayerGroup(e.target));
            if (input.checked) toggleLayerGroup(input);
        });
    </script>
</body>
</html>
