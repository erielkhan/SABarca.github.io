<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Sant Andreu de la Barca - OSM</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-sidebar: rgba(255, 255, 255, 0.95);
            --accent: #3498db;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        #sidebar {
            position: absolute; top: 20px; left: 20px; width: 310px; z-index: 1000;
            background: var(--bg-sidebar); padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); max-height: 85vh; overflow-y: auto;
        }

        h2 { margin: 0; color: var(--primary-color); font-size: 1.3rem; }
        p.subtitle { margin: 0 0 15px 0; font-size: 0.8rem; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        details { margin-bottom: 10px; border-radius: 8px; background: #f1f3f5; overflow: hidden; border: 1px solid transparent; }
        summary { padding: 12px; font-weight: bold; font-size: 0.85rem; color: var(--primary-color); cursor: pointer; display: flex; align-items: center; text-transform: uppercase; letter-spacing: 0.5px; }
        .category-toggle { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }
        .category-content { padding: 5px 10px 10px 10px; background: #fff; }

        .layer-item { display: flex; align-items: center; padding: 8px; margin-bottom: 4px; background: #f8f9fa; border-radius: 6px; cursor: pointer; }
        .layer-item:hover { background: #e9ecef; }
        .layer-item input { margin-right: 12px; width: 16px; height: 16px; cursor: pointer; }
        .layer-item label { cursor: pointer; flex-grow: 1; font-size: 0.9rem; }

        .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); margin-left: 5px; }

        /* Estils Taula OSM */
        .osm-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.75rem; }
        .osm-table th { text-align: left; padding: 4px; background: #f2f2f2; border: 1px solid #ddd; width: 35%; color: #666; }
        .osm-table td { padding: 4px; border: 1px solid #ddd; word-break: break-word; color: #333; }
        .popup-title { font-size: 0.95rem; font-weight: bold; color: var(--primary-color); display: block; margin-bottom: 5px; padding-bottom: 3px; border-bottom: 2px solid #eee; }

        @media (max-width: 480px) { #sidebar { width: calc(100% - 40px); left: 10px; top: 10px; } }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Sant Andreu de la Barca</h2>
        <p class="subtitle">Guia visual d'elements OSM</p>

        <details open>
            <summary>
                <input type="checkbox" class="category-toggle">
                Aparcaments
            </summary>
            <div class="category-content">
                <div class="layer-item">
                    <input type="checkbox" class="layer-toggle" id="parking-lliure" data-file="aparcament-lliure.geojson" data-color="#2ecc71">
                    <label for="parking-lliure">Lliure</label>
                    <div class="dot" style="background: #2ecc71;"></div>
                </div>
                <div class="layer-item">
                    <input type="checkbox" class="layer-toggle" id="parking-blava" data-file="aparcament-blava.geojson" data-color="#3498db">
                    <label for="parking-blava">Zona Blava</label>
                    <div class="dot" style="background: #3498db;"></div>
                </div>
            </div>
        </details>

        <details>
            <summary>
                <input type="checkbox" class="category-toggle">
                Cultura i Patrimoni
            </summary>
            <div class="category-content">
                <div class="layer-item">
                    <input type="checkbox" class="layer-toggle" id="patrimoni" data-file="patrimoni.geojson" data-color="#e74c3c">
                    <label for="patrimoni">Patrimoni Històric</label>
                    <div class="dot" style="background: #e74c3c;"></div>
                </div>
            </div>
        </details>

    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([41.4475, 1.9328], 15);
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const individualLayers = {};

        // Generador de taula amb tota la info d'OSM
        function crearPopupOSM(props) {
            let html = `<span class="popup-title">${props.name || "Sense nom"}</span>`;
            html += `<table class="osm-table">`;
            for (const clau in props) {
                if (!['name', 'id'].includes(clau) && !clau.startsWith('@')) {
                    const valor = props[clau];
                    const content = (typeof valor === 'string' && valor.startsWith('http')) 
                        ? `<a href="${valor}" target="_blank">Enllaç</a>` : valor;
                    html += `<tr><th>${clau}</th><td>${content}</td></tr>`;
                }
            }
            html += `</table>`;
            return html;
        }

        async function toggleLayer(checkbox) {
            const id = checkbox.id;
            const fileName = checkbox.getAttribute('data-file');
            const color = checkbox.getAttribute('data-color');
            const filePath = `dades/${fileName}`;

            if (checkbox.checked) {
                if (individualLayers[id]) {
                    map.addLayer(individualLayers[id]);
                } else {
                    try {
                        const response = await fetch(filePath);
                        if (!response.ok) throw new Error("Fitxer no trobat");
                        const data = await response.json();

                        const geojsonLayer = L.geoJSON(data, {
                            pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                                radius: 8, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9
                            }),
                            onEachFeature: (f, layer) => {
                                layer.bindPopup(crearPopupOSM(f.properties), { maxWidth: 260 });
                            }
                        });

                        individualLayers[id] = geojsonLayer;
                        map.addLayer(geojsonLayer);
                    } catch (err) { console.error("Error:", err); }
                }
            } else {
                if (individualLayers[id]) map.removeLayer(individualLayers[id]);
            }
        }

        // Event Listeners
        document.querySelectorAll('.layer-toggle').forEach(input => {
            input.addEventListener('change', (e) => toggleLayer(e.target));
        });

        document.querySelectorAll('.category-toggle').forEach(master => {
            master.addEventListener('click', (e) => e.stopPropagation());
            master.addEventListener('change', function() {
                const childs = this.closest('details').querySelectorAll('.layer-toggle');
                childs.forEach(c => {
                    if(c.checked !== this.checked) {
                        c.checked = this.checked;
                        toggleLayer(c);
                    }
                });
            });
        });
    </script>
</body>
</html>
