<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Sant Andreu de la Barca - OSM</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-sidebar: rgba(255, 255, 255, 0.95);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        #sidebar {
            position: absolute; top: 20px; left: 20px; width: 310px; z-index: 1000;
            background: var(--bg-sidebar); padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); max-height: 85vh; overflow-y: auto;
        }

        h2 { margin: 0; color: var(--primary-color); font-size: 1.3rem; }
        p.subtitle { margin: 0 0 15px 0; font-size: 0.8rem; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        details { margin-bottom: 10px; border-radius: 8px; background: #f1f3f5; overflow: hidden; }
        summary { padding: 12px; font-weight: bold; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; text-transform: uppercase; }
        .category-toggle { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }
        .category-content { padding: 5px 10px 10px 10px; background: #fff; }

        .layer-item { display: flex; align-items: center; padding: 8px; margin-bottom: 4px; background: #f8f9fa; border-radius: 6px; cursor: pointer; }
        .layer-item input { margin-right: 12px; width: 16px; height: 16px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); margin-left: 5px; }

        /* Estilos Popup */
        .osm-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.75rem; }
        .osm-table th { text-align: left; padding: 4px; background: #f9f9f9; border: 1px solid #ddd; color: #666; }
        .osm-table td { padding: 4px; border: 1px solid #ddd; color: #333; }
        .popup-header { font-size: 1rem; font-weight: bold; display: block; margin-bottom: 5px; padding-bottom: 3px; border-bottom: 2px solid #eee; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Sant Andreu de la Barca</h2>
        <p class="subtitle">Visor d'elements d'OpenStreetMap</p>

        <details open>
            <summary>
                <input type="checkbox" class="category-toggle">
                Aparcaments
            </summary>
            <div class="category-content">
                <div class="layer-item">
                    <input type="checkbox" class="layer-toggle" id="park-lliure" data-file="aparcament-lliure.geojson" data-color="#2ecc71">
                    <label for="park-lliure">Lliure</label>
                    <div class="dot" style="background: #2ecc71;"></div>
                </div>
                <div class="layer-item">
                    <input type="checkbox" class="layer-toggle" id="park-blava" data-file="aparcament-blava.geojson" data-color="#3498db">
                    <label for="park-blava">Zona Blava</label>
                    <div class="dot" style="background: #3498db;"></div>
                </div>
            </div>
        </details>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- COORDENADAS ACTUALIZADAS ---
        const centroSAB = [41.44997317478169, 1.9711849410595195];
        
        const map = L.map('map', { zoomControl: false }).setView(centroSAB, 16);
        
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const individualLayers = {};

        function crearPopup(props, color) {
            let html = `<span class="popup-header" style="color: ${color}">${props.name || "Sense nom"}</span>`;
            html += `<table class="osm-table">`;
            for (const clau in props) {
                if (!['name', 'id'].includes(clau) && !clau.startsWith('@')) {
                    const valor = props[clau];
                    const valHtml = (typeof valor === 'string' && valor.startsWith('http')) 
                        ? `<a href="${valor}" target="_blank">Enllaç</a>` : valor;
                    html += `<tr><th>${clau}</th><td>${valHtml}</td></tr>`;
                }
            }
            html += `</table>`;
            return html;
        }

        async function toggleLayer(checkbox) {
            const id = checkbox.id;
            const fileName = checkbox.getAttribute('data-file');
            const colorCapa = checkbox.getAttribute('data-color');
            const filePath = `dades/${fileName}`;

            if (checkbox.checked) {
                if (individualLayers[id]) {
                    map.addLayer(individualLayers[id]);
                } else {
                    try {
                        const response = await fetch(filePath);
                        if (!response.ok) throw new Error("Fitxer no trobat");
                        const data = await response.json();

                        const geojsonLayer = L.geoJSON(data, {
                            pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                                radius: 9,
                                fillColor: colorCapa,
                                color: "#ffffff",
                                weight: 2,
                                opacity: 1,
                                fillOpacity: 0.9
                            }),
                            onEachFeature: (feature, layer) => {
                                layer.bindPopup(crearPopup(feature.properties, colorCapa), { maxWidth: 260 });
                            }
                        });

                        individualLayers[id] = geojsonLayer;
                        map.addLayer(geojsonLayer);
                    } catch (err) {
                        console.error("Error carregant:", fileName, err);
                    }
                }
            } else {
                if (individualLayers[id]) map.removeLayer(individualLayers[id]);
            }
        }

        document.querySelectorAll('.layer-toggle').forEach(input => {
            input.addEventListener('change', (e) => toggleLayer(e.target));
        });

        document.querySelectorAll('.category-toggle').forEach(master => {
            master.addEventListener('click', (e) => e.stopPropagation());
            master.addEventListener('change', function() {
                const parent = this.closest('details');
                const children = parent.querySelectorAll('.layer-toggle');
                children.forEach(c => {
                    if (c.checked !== this.checked) {
                        c.checked = this.checked;
                        toggleLayer(c);
                    }
                });
            });
        });
    </script>
</body>
</html>
